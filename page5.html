<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe4ec,#fff5f7);
}

/* message box */
.box{
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

h1{
    color:#ff4081;
    margin-bottom:10px;
}

p{
    font-size:18px;
    color:#555;
}

/* home button */
.home-btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 26px;
    background:#ff80ab;
    color:white;
    text-decoration:none;
    border-radius:25px;
    transition: 0.3s ease;
    font-weight:bold;
}

/* hover effect */
.home-btn:hover{
    background:#ff4081;
    transform: scale(1.08);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<div class="box">
    <h1>🎉 Thank You! 🎉</h1>
    <p>Thank you for your response.</p>
    <p>Have a great day! 😊</p>

    <a href="page2.html" class="home-btn">Back to Home</a>
</div>

</body>
</html>
