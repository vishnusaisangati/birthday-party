}

/* Heading */
h1 {
    background: #ff4081;
    color: white;
    padding: 20px;
    margin: 0;
}

/* Table Styling */
table {
    margin: 40px auto;
    border-collapse: collapse;
    width: 70%;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}

th, td {
    padding: 15px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #ff80ab;
    color: white;
}

tr:hover {
    background-color: #ffe4ec;
}

/* Images */
img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
}

/* Menu Button */
.menu-btn {
    display: inline-block;
    margin: 30px;
    padding: 12px 30px;
    background: #ff4081;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    font-size: 18px;
    transition: 0.3s;
}

.menu-btn:hover {
    background: #e91e63;
}
</style>
</head>
